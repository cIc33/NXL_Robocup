press_estop_node:
  ros__parameters:
    use_sim_time: true
    planning_group: arm
    pose_topic: /button_pose
    base_frame: base_link
    approach_distance: 0.08
    press_distance: 0.003
    retreat_distance: 0.08
    pose_timeout: 1.0
    velocity_scaling: 0.2
    acceleration_scaling: 0.2
    cartesian_eef_step: 0.005
    jump_threshold: 0.0
    cartesian_fraction_threshold: 0.95
    approach_axis: z
    press_axis_sign: 1.0

###############################################
# MoveIt Servo parameters for Piper with gripper
###############################################

## Properties of incoming commands
command_in_type: "unitless"
scale:
  linear: 0.05
  rotational: 0.30
  joint: 0.50

## Properties of outgoing commands
publish_period: 0.02
low_latency_mode: false
command_out_type: trajectory_msgs/JointTrajectory
publish_joint_positions: true
publish_joint_velocities: true
publish_joint_accelerations: false

## Planning scene monitor
is_primary_planning_scene_monitor: false

## Incoming Joint State properties
low_pass_filter_coeff: 2.0

## MoveIt properties
move_group_name: arm
planning_frame: base_link

## Other frames
ee_frame_name: gripper_base
robot_link_command_frame: gripper_base

## Stopping behaviour
incoming_command_timeout: 0.10
num_outgoing_halt_msgs_to_publish: 4

## Singularity and joint limit handling
# Piper standard has shorter links than Piper X → higher condition numbers in normal poses
lower_singularity_threshold: 100.0
hard_stop_singularity_threshold: 400.0
joint_limit_margin: 0.03
leaving_singularity_threshold_multiplier: 2.0

## Topic names
cartesian_command_in_topic: ~/delta_twist_cmds
joint_command_in_topic: ~/delta_joint_cmds
joint_topic: /joint_states
status_topic: ~/status
command_out_topic: /arm_controller/joint_trajectory

## Collision checking
check_collisions: false
collision_check_rate: 10.0
collision_check_type: threshold_distance
self_collision_proximity_threshold: 0.01
scene_collision_proximity_threshold: 0.02
collision_distance_safety_factor: 1000.0
min_allowable_collision_distance: 0.01
